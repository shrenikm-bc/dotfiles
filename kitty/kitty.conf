# BEGIN_KITTY_THEME
# Adapta Nokto Maia
include current-theme.conf
# END_KITTY_THEME

# Hide mosue while typing
mouse_hide_wait -1.0

# Hardware acceleration
gpu yes

# Send a distinct escape sequence for Shift+Enter so it survives tmux
# (default Enter and Shift+Enter both collapse to CR otherwise).
map shift+enter send_text all \x1b[13;2u

