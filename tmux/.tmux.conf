# General settings
# ----------------------------------------------------------------------------
set -g mouse on
# Number windows starting at 1
set -g base-index 1
# Number panes starting at 1
setw -g pane-base-index 1
# Faster ESC detection
set -sg escape-time 10

# Better copy mode with system clipboard
setw -g mode-keys vi
# Note: Requires xclip
bind -T copy-mode-vi y send-keys -X copy-pipe-and-c "xclip -selection clipboard -in"

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"

# Panel navigation shortcuts are set through tmux-pain-protocol
# Moving between panes: Prefix + h or C-h, etc
# Resizing panes: Prefix + H, etc

# Override keymaps for moving between windows.
bind -n C-p previous-window
bind -n C-n next-window


# Plugins
# ----------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
# Sensible has the following settings by default:
# set -s escape-time 0
# set -g history-limit 50000
# set -g display-time 4000
# set -g status-interval 5
# set -g default-command "reattach-to-user-namespace -l $SHELL"
# set -g default-terminal "screen-256color"
# set -g status-keys emacs
# set -g focus-events on
# setw -g aggressive-resize on
# set -g @plugin 'tmux-plugins/tmux-sensible'
# bind C-p previous-window
# bind C-n next-window
# bind R source-file '~/.tmux.conf'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin settings
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "yes"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"

# Set status bar
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Initialize TPM (Needs to be at the very bottom of .tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

