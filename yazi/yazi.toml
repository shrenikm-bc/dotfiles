[mgr]
# Column ratios: parent : current : preview
ratio = [1, 3, 4]
# Sort
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
# Display
show_hidden = true
show_symlink = true
linemode = "size"
# Title
title_format = "Yazi: {cwd}"

[preview]
# Image preview (kitty protocol)
max_width = 1000
max_height = 1000
image_quality = 75

[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', block = true, for = "unix" },
]

[open]
rules = [
  { name = "*/", use = ["edit", "reveal"] },

  { mime = "text/*", use = ["edit", "reveal"] },
  { mime = "image/*", use = ["open", "reveal"] },
  { mime = "video/*", use = ["open", "reveal"] },
  { mime = "audio/*", use = ["open", "reveal"] },
  { mime = "application/json", use = ["edit", "reveal"] },
  { mime = "application/x-yaml", use = ["edit", "reveal"] },
  { mime = "application/toml", use = ["edit", "reveal"] },

  { mime = "*", use = ["open", "reveal"] },
]
