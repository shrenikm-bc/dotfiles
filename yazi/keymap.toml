[mgr]
prepend_keymap = [
  # Quick navigation
  { on = ["g", "h"], run = "cd ~", desc = "Go to home directory" },
  { on = ["g", "c"], run = "cd ~/.config", desc = "Go to config directory" },
  { on = ["g", "d"], run = "cd ~/Downloads", desc = "Go to downloads" },
  { on = ["g", "p"], run = "cd ~/Projects", desc = "Go to projects" },

  # Extract archive to current directory
  { on = [" ", "x"], run = 'shell "unzip -o $@ -d ${1%.*}" --confirm', desc = "Extract archive here" },

  # Toggle hidden files
  { on = ["z", "h"], run = "hidden toggle", desc = "Toggle hidden files" },

  # Search
  { on = [",", "f", "f"], run = "search fd", desc = "Search files by name" },
  { on = [",", "s", "g"], run = "search rg", desc = "Search file contents" },

  # Copy the hovered file's contents into the system clipboard.
  # Binary files will produce garbage in the clipboard -- intended for text files.
  { on = ["<C-y>"], run = 'shell "xclip -selection clipboard -in < \"$1\""', desc = "Copy file contents to clipboard" },
]
